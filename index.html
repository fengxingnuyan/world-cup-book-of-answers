<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界杯答案之书</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="inputView" class="screen screen-input">
        <div class="panel hero-panel">
          <p class="eyebrow">WORLD CUP BOOK OF ANSWERS</p>
          <h1>世界杯答案之书</h1>
          <p class="lead">把问题交给命运，把答案交给比赛。</p>

          <div class="input-panel">
            <label class="sr-only" for="questionInput">输入你的问题</label>
            <textarea
              id="questionInput"
              class="question-input"
              rows="3"
              maxlength="120"
              placeholder="把问题写下来，剩下的交给比赛。"
            ></textarea>
          </div>

          <div class="primary-actions">
            <button id="drawButton" class="primary-button" type="button">开球</button>
          </div>
        </div>
      </section>

      <section id="answerView" class="screen screen-answer hidden">
        <div class="panel answer-panel">
          <p id="stageMessage" class="stage-message">比赛正在给你答案……</p>

          <article id="resultCard" class="result-card hidden" aria-live="polite">
            <div class="card-frame">
              <p class="card-title">世界杯答案之书</p>
              <div class="card-divider"></div>
              <p id="cardQuestion" class="card-question"></p>
              <p id="cardAnswer" class="card-answer"></p>
            </div>
          </article>

          <div id="resultActions" class="result-actions hidden">
            <button id="againButton" class="secondary-button" type="button">再开一球</button>
            <button id="saveButton" class="secondary-button secondary-button-save" type="button">保存图片</button>
          </div>
          <a
            id="githubStarLink"
            class="github-star-link hidden"
            href="https://github.com/fengxingnuyan/world-cup-book-of-answers"
            target="_blank"
            rel="noreferrer"
            aria-label="前往 GitHub 给项目点个 Star"
          >
            <span class="github-star-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M12 2C6.478 2 2 6.59 2 12.252c0 4.53 2.865 8.373 6.839 9.73.5.096.682-.222.682-.494 0-.244-.009-.89-.014-1.747-2.782.617-3.369-1.376-3.369-1.376-.455-1.183-1.11-1.498-1.11-1.498-.908-.637.069-.624.069-.624 1.004.072 1.532 1.054 1.532 1.054.892 1.566 2.341 1.114 2.91.852.091-.667.349-1.114.635-1.37-2.221-.26-4.555-1.14-4.555-5.073 0-1.12.39-2.036 1.03-2.754-.104-.262-.447-1.315.098-2.741 0 0 .84-.276 2.75 1.052A9.36 9.36 0 0 1 12 6.86a9.36 9.36 0 0 1 2.504.346c1.909-1.328 2.748-1.052 2.748-1.052.547 1.426.203 2.479.1 2.741.64.718 1.028 1.634 1.028 2.754 0 3.943-2.337 4.81-4.565 5.064.359.318.678.946.678 1.906 0 1.376-.012 2.485-.012 2.824 0 .274.18.594.688.492C19.138 20.621 22 16.78 22 12.252 22 6.59 17.522 2 12 2Z"
                />
              </svg>
            </span>
            <span class="github-star-text">觉得好用？去 GitHub 点个 Star</span>
          </a>
          <p id="saveHint" class="share-hint hidden"></p>
        </div>
      </section>
    </main>

    <template id="shareFallbackTemplate">
      <a download="world-cup-answer.png"></a>
    </template>

    <script src="./answers.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
